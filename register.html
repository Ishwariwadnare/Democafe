<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - democafe</title>
  <!-- tailwind css link -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#6F4E37", //  coffee brown
            secondary: "#F5EDE6" // cream background
          }
        }
      }
    }
  </script>
<!--google fonts link -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    h1, h2, h3, .brand-font {
      font-family: 'Playfair Display', serif;
    }
    /* Simple glassmorphism effect for the form */
    .glass-form {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="bg-secondary min-h-screen flex items-center justify-center p-4 md:p-10 font-[Poppins]">

  <div class="bg-white w-full max-w-7xl rounded-3xl shadow-2xl overflow-hidden grid md:grid-cols-2 gap-0">

    <div class="relative bg-primary p-12 text-white flex flex-col justify-between overflow-hidden hidden md:flex">
      
      <img src="assets/images/hero1.jpg" alt="Cafe Ambience" class="absolute inset-0 w-full h-full object-cover opacity-20">

      <div class="relative z-10">
        <a href="index.html" class="text-3xl font-bold brand-font tracking-tight">democafe</a>
        
        <div class="mt-20">
          <h1 class="text-5xl font-bold leading-tight brand-font mb-4">Join Our<br>Digital Community.</h1>
          <p class="text-secondary/80 text-lg max-w-md">Create your unique account to experience faster service and exclusive rewards, built for the modern cafe lover.</p>
        </div>
      </div>

      <div class="relative z-10 mt-auto self-center w-full max-w-sm">
        <img src="assets/images/hero1.jpg" alt="Community Illustration" class="w-full h-auto">
      </div>
      
    </div>


    <div class="bg-white p-10 md:p-16 flex flex-col justify-center glass-form">
      
      <div class="text-center mb-8 md:hidden">
        <a href="index.html" class="text-3xl font-bold brand-font text-primary">democafe</a>
      </div>

      <div class="mb-10 text-center md:text-left">
        <h2 class="text-4xl font-bold text-gray-900 brand-font mb-2">Create Account</h2>
        <p class="text-gray-500">Become a part of the democafe family</p>
      </div>

      <form class="space-y-5">
        
        <div class="grid md:grid-cols-2 gap-5">
            <div>
              <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
              <input type="text" id="first_name"  
                     class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-primary focus:ring-1 focus:ring-primary transition">
            </div>
            <div>
              <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
              <input type="text" id="last_name"
                     class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-primary focus:ring-1 focus:ring-primary transition">
            </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email"  
                 class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-primary focus:ring-1 focus:ring-primary transition">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" placeholder="••••••••" 
                 class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-primary focus:ring-1 focus:ring-primary transition">
        </div>

        <div class="flex items-center text-sm pt-2">
            <input type="checkbox" id="terms" class="h-4 w-4 text-primary border-gray-300 rounded focus:ring-primary">
            <label for="terms" class="ml-2 text-gray-600">I agree to the <a href="#" class="text-primary hover:underline font-medium">Terms & Conditions</a></label>
        </div>

        <button type="submit" 
                class="w-full bg-primary text-white py-4 rounded-xl font-semibold shadow-lg shadow-primary/30 hover:bg-opacity-95 active:scale-[0.98] transition-all">
          Create Account
        </button>
      </form>

      <div class="mt-12 text-center text-gray-600">
        <p>Already have an account? 
          <a href="login.html" class="text-primary font-bold hover:underline">Login</a>
        </p>
        <div class="mt-6">
            <a href="index.html" class="text-sm text-gray-400 hover:text-primary transition">← Back to Home</a>
        </div>
      </div>

    </div>

  </div>

</body>
<!-- js links --->
<script src="js/script.js"></script>
</html>
